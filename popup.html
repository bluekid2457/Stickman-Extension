<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explain Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="popup-root">
        <h1>Explain Settings</h1>

        <label for="apiKeyInput">API Key</label>
        <input id="apiKeyInput" type="password" placeholder="Enter API key">
        <p id="maskedKeyPreview" class="helper-text">Saved key: none</p>

        <label for="endpointInput">Endpoint</label>
        <input id="endpointInput" type="url" placeholder="https://api.openai.com/v1/responses">

        <button id="saveButton" type="button">Save</button>
        <p id="statusText" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
</body>
</html>
